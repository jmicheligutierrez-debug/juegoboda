<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificación en Tiempo Real 🏆</title>
    <style>
        :root {
            --primary-color: #d4af37; /* Dorado elegante */
            --bg-color: #f9f6f0;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            text-align: center;
        }

        /* Contenedor de la tabla */
        .leaderboard-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 10px 0;
        }

        /* Filas del ranking */
        .leaderboard-row {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid #f0ehe7;
            transition: background-color 0.3s;
        }

        .leaderboard-row:last-child {
            border-bottom: none;
        }

        /* Estilos especiales para el podio (Top 3) */
        .rank {
            font-size: 22px;
            font-weight: bold;
            width: 50px;
            text-align: center;
        }

        .rank-1 { color: #ffd700; font-size: 28px; } /* Oro */
        .rank-2 { color: #c0c0c0; font-size: 26px; } /* Plata */
        .rank-3 { color: #cd7f32; font-size: 24px; } /* Bronce */

        .name {
            flex-grow: 1;
            font-size: 20px;
            font-weight: 500;
            padding-left: 10px;
        }

        .time {
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
            background: #fdf2f2;
            padding: 6px 15px;
            border-radius: 15px;
        }

        /* Animación sutil cuando entra un nuevo tiempo */
        @keyframes highlight {
            0% { background-color: rgba(212, 175, 55, 0.3); }
            100% { background-color: transparent; }
        }

        .new-entry {
            animation: highlight 2s ease-out;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #999;
        }
    </style>
</head>
<body>

    <h1>Ranking de los Más Rápidos 🏆</h1>
    <div class="subtitle">¿Quién conoce mejor nuestra historia?</div>

    <div class="leaderboard-container">
        <div id="leaderboard-list">
            <div class="no-data">Esperando a los primeros jugadores... ¡Escanea el código QR para empezar!</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // ⚠️ USA LA MISMA CONFIGURACIÓN AQUÍ ⚠️
        const firebaseConfig = {
  apiKey: "AIzaSyBuwoa_Y22UbPEhj_i9RFfgeq1zKTL5Zok",
  authDomain: "nuestra-historia-de-amor-ab353.firebaseapp.com",
  projectId: "nuestra-historia-de-amor-ab353",
  storageBucket: "nuestra-historia-de-amor-ab353.firebasestorage.app",
  messagingSenderId: "398649481201",
  appId: "1:398649481201:web:60171522b878aa045ad650"
};
        // ==========================================

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Consultar la base de datos: Ordenar por 'tiempo' de menor a mayor y limitar al Top 10
        const rankingQuery = query(
            collection(db, "ranking"),
            orderBy("tiempo", "asc"),
            limit(10)
        );

        const leaderboardList = document.getElementById('leaderboard-list');

        // Escuchar cambios en tiempo real
        onSnapshot(rankingQuery, (snapshot) => {
            if (snapshot.empty) {
                leaderboardList.innerHTML = '<div class="no-data">Esperando a los primeros jugadores... ¡Escanea el código QR para empezar!</div>';
                return;
            }

            leaderboardList.innerHTML = ""; // Limpiar lista antes de actualizar
            let posicion = 1;

            snapshot.forEach((doc) => {
                const jugador = doc.data();
                
                // Crear la fila del ranking
                const row = document.createElement('div');
                row.classList.add('leaderboard-row');
                
                // Asignar medallas o números según la posición
                let rankDisplay = posicion;
                let rankClass = "";
                if (posicion === 1) { rankDisplay = "🥇"; rankClass = "rank-1"; }
                else if (posicion === 2) { rankDisplay = "🥈"; rankClass = "rank-2"; }
                else if (posicion === 3) { rankDisplay = "🥉"; rankClass = "rank-3"; }

                row.innerHTML = `
                    <div class="rank ${rankClass}">${rankDisplay}</div>
                    <div class="name">${escapeHTML(jugador.nombre)}</div>
                    <div class="time">${jugador.tiempo.toFixed(2)}s</div>
                `;

                leaderboardList.appendChild(row);
                posicion++;
            });
        });

        // Función de seguridad para evitar que los invitados escriban código raro en su nombre
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
